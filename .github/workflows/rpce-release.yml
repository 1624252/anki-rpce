name: RPCE Release

# Publishes a GitHub Release for the Speedrun-for-RPCE fork when a v*-rpce tag is
# pushed (release.bat does that). The MSI and APK are built locally on the
# maintainer's machine — it has the proven Rust+briefcase toolchain and the
# prebuilt Android jniLibs — and uploaded to this release by release.bat. This
# job only creates the release entry with autogenerated notes, so publishing is
# recorded as a CI action. Scoped to the -rpce suffix so it never collides with
# the upstream release.yml (which is workflow_dispatch + signing/PyPI).

on:
  push:
    tags:
      - "v*-rpce"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create the release (assets uploaded by release.bat)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.ref_name }}"
          repo="${{ github.repository }}"
          # Title drops the -rpce suffix: "Speedrun for the RPCE — v0.1.2".
          title="Speedrun for the RPCE — ${tag%-rpce}"
          if gh release view "$tag" --repo "$repo" >/dev/null 2>&1; then
            echo "Release $tag already exists — leaving it in place."
          else
            gh release create "$tag" --repo "$repo" --title "$title" --generate-notes
          fi
